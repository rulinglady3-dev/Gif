<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>♡ Letter for Yu ♡</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- Zarf -->
<div id="envelope-container">
    <img src="envelope.png" alt="Envelope">
</div>


<!-- Mektup -->
<div id="letter-container">

    <div class="letter-window">

        <h1 id="letter-title">♡ Letter for Yu ♡</h1>

        <img id="letter-cat" src="cat_heart.gif" alt="Cat">

        <p>Will you be my friend ? ❤️</p>


        <div id="letter-buttons">

            <img class="btn yes-btn" src="yes.png" alt="Yes">

            <img class="btn no-btn" src="no.png" alt="No">

        </div>


        <div id="final-text">
            Yippeeee! ❤️
        </div>

    </div>

</div>


<script src="script.js"></script>

</body>
</html>
