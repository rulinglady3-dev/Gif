<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Letter</title>

<link rel="stylesheet" href="style.css">
</head>

<body>


<div id="envelope-container">

    <img src="envelope.png" alt="Envelope">

    <p>This letter is for you ❤️</p>

</div>



<div id="letter-container">

    <div class="letter-window">


        <img id="letter-cat" src="cat_heart.gif">


        <p id="message">
            Yu, will you be my friend ? ❤️
        </p>


        <div id="letter-buttons">

            <img class="btn yes-btn" src="yes.png">

            <img class="btn no-btn" src="no.png">

        </div>


        <div id="final-text"></div>


    </div>

</div>


<script src="script.js"></script>

</body>
</html>
