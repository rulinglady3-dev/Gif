<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>♡ Letter for Yu ♡</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="envelope-container">
    💌
</div>

<div id="letter-container">

    <div class="letter-window">

        <h1 id="letter-title">♡ Letter for Yu ♡</h1>

        <img id="letter-cat" src="cat.gif" alt="cat">

        <p>Will you be my friend ? ❤️</p>

        <div id="letter-buttons">
            <button class="btn yes-btn">Yes ❤️</button>
            <button class="btn no-btn">No 💔</button>
        </div>

        <div id="final-text">
            You made me happy ❤️
        </div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
